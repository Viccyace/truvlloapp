<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, viewport-fit=cover" />

  <!-- ── Primary SEO ─────────────────────────────────────────────────────── -->
  <title>Truvllo — The AI Budgeting App That Thinks With You</title>
  <meta name="description"
    content="Truvllo is the AI budgeting app that thinks with you. Track spending, get daily safe-to-spend limits, and let AI coach you to save more. Free to start." />
  <meta name="keywords"
    content="ai budgeting app, budget tracker, personal finance app, spending tracker, ai budget planner, truvllo" />
  <meta name="author" content="Truvllo" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://truvllo.app/" />

  <!-- ── Theme ──────────────────────────────────────────────────────────── -->
  <meta name="theme-color" content="#1B4332" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Truvllo" />

  <!-- ── Open Graph (WhatsApp, Facebook, LinkedIn previews) ────────────── -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Truvllo" />
  <meta property="og:url" content="https://truvllo.app/" />
  <meta property="og:title" content="Truvllo — The AI Budgeting App That Thinks With You" />
  <meta property="og:description"
    content="Truvllo is the AI budgeting app that thinks with you. Track spending, get daily safe-to-spend limits, and let AI coach you to save more. Free to start." />
  <meta property="og:image" content="https://truvllo.app/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Truvllo — The AI Budgeting App That Thinks With You" />
  <meta property="og:locale" content="en_NG" />

  <!-- ── Twitter Card ──────────────────────────────────────────────────── -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Truvllo — The AI Budgeting App That Thinks With You" />
  <meta name="twitter:description"
    content="Truvllo is the AI budgeting app that thinks with you. Track spending, get daily safe-to-spend limits, and let AI coach you to save more. Free to start." />
  <meta name="twitter:image" content="https://truvllo.app/og-image.png" />

  <!-- ── Structured Data ───────────────────────────────────────────────── -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Truvllo",
    "url": "https://truvllo.app",
    "description": "The AI budgeting app that thinks with you. Track spending, get daily safe-to-spend limits, and let AI coach you to save more.",
    "applicationCategory": "FinanceApplication",
    "operatingSystem": "Web, Android, iOS",
    "offers": [
      { "@type": "Offer", "price": "0",    "priceCurrency": "NGN", "name": "Free Plan" },
      { "@type": "Offer", "price": "6500", "priceCurrency": "NGN", "name": "Premium Plan", "billingPeriod": "P1M" }
    ],
    "featureList": [
      "Budget pace tracking",
      "Safe-to-spend daily limit",
      "AI spending analyst",
      "Natural language expense entry",
      "Multi-currency support",
      "Category spending caps",
      "CSV export"
    ],
    "inLanguage": "en",
    "countriesSupported": "NG, GH, KE, US, GB",
    "publisher": {
      "@type": "Organization",
      "name": "Truvllo",
      "url": "https://truvllo.app"
    }
  }
  </script>

  <!-- ── Icons ──────────────────────────────────────────────────────────── -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />

  <!-- ── Fonts ─────────────────────────────────────────────────────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- ── Global fixes ──────────────────────────────────────────────────── -->
  <style>
    * {
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      overflow-x: hidden;
      overscroll-behavior-x: none;
    }

    input,
    select,
    textarea {
      font-size: 16px !important;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
