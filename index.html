<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, viewport-fit=cover" />

  <!-- ── Primary SEO ─────────────────────────────────────────────────────── -->
  <title>Truvllo — AI Budgeting App That Thinks With You</title>
  <meta name="description"
    content="Track spending, get daily safe-to-spend limits, and let AI coach you to save more. Free to start — 14-day Premium trial included." />
  <meta name="keywords"
    content="ai budgeting app, budget tracker, personal finance app, spending tracker, ai budget planner, truvllo" />
  <meta name="author" content="Truvllo" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://www.truvllo.app/" />

  <!-- ── Theme ──────────────────────────────────────────────────────────── -->
  <meta name="theme-color" content="#1B4332" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Truvllo" />

  <!-- ── Open Graph — www URLs, JPEG image, optimal lengths ────────────── -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Truvllo" />
  <meta property="og:url" content="https://www.truvllo.app/" />
  <meta property="og:title" content="Truvllo — AI Budgeting App That Thinks With You" />
  <meta property="og:description"
    content="Track spending, get daily safe-to-spend limits, and let AI coach you to save more. Free 14-day Premium trial — no card needed." />
  <meta property="og:image" content="https://www.truvllo.app/og-image.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:type" content="image/jpeg" />
  <meta property="og:image:alt" content="Truvllo — AI budgeting app dashboard" />
  <meta property="og:locale" content="en_NG" />

  <!-- ── Twitter Card ──────────────────────────────────────────────────── -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@truvlloapp" />
  <meta name="twitter:title" content="Truvllo — AI Budgeting App That Thinks With You" />
  <meta name="twitter:description"
    content="Track spending, get daily safe-to-spend limits, and let AI coach you to save more. Free 14-day Premium trial — no card needed." />
  <meta name="twitter:image" content="https://www.truvllo.app/og-image.jpg" />
  <meta name="twitter:image:alt" content="Truvllo — AI budgeting app dashboard" />

  <!-- ── Structured Data ───────────────────────────────────────────────── -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Truvllo",
    "url": "https://www.truvllo.app",
    "description": "The AI budgeting app that thinks with you. Track spending, get daily safe-to-spend limits, and let AI coach you to save more.",
    "applicationCategory": "FinanceApplication",
    "operatingSystem": "Web, Android, iOS",
    "offers": [
      { "@type": "Offer", "price": "0",    "priceCurrency": "NGN", "name": "Free Plan" },
      { "@type": "Offer", "price": "6500", "priceCurrency": "NGN", "name": "Premium Plan", "billingPeriod": "P1M" }
    ],
    "featureList": [
      "Budget pace tracking",
      "Safe-to-spend daily limit",
      "AI spending analyst",
      "Natural language expense entry",
      "WhatsApp AI agent",
      "Bank statement import",
      "Multi-currency support",
      "Category spending caps",
      "CSV export"
    ],
    "inLanguage": "en",
    "countriesSupported": "NG, GH, KE, US, GB",
    "publisher": {
      "@type": "Organization",
      "name": "Truvllo",
      "url": "https://www.truvllo.app"
    }
  }
  </script>

  <!-- ── Icons ──────────────────────────────────────────────────────────── -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.json" />

  <!-- ── Fonts ─────────────────────────────────────────────────────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,900;1,400;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" />

  <!-- ── Critical CSS — prevents LCP flash, matches app cream ──────────── -->
  <style>
    * {
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
    }

    html,
    body {
      overflow-x: hidden;
      overscroll-behavior-x: none;
      margin: 0;
      padding: 0;
    }

    input,
    select,
    textarea {
      font-size: 16px !important;
    }

    body {
      background: #FAF8F3;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    }

    #root {
      min-height: 100vh;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
